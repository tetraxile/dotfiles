[theme]
theme = "solarized-dark"

[icons]
icons = "awesome4"


# REMINDERS

[[block]]
block = "custom"
json = true
command = '''echo "{\"state\":\"Critical\", \"text\":\"`test -f ~/.remind/meds && echo meds`\"}" '''
interval = 10
hide_when_empty = true
signal = 2
[[block.click]]
button = "left"
cmd = "rm ~/.remind/meds && pkill -SIGRTMIN+2 i3status-rs"

[[block]]
block = "custom"
json = true
command = '''echo "{\"state\":\"Critical\", \"text\":\"`test -f ~/.remind/todo && echo todo`\"}" '''
interval = 10
hide_when_empty = true
signal = 2
[[block.click]]
button = "left"
cmd = "rm ~/.remind/todo && pkill -SIGRTMIN+2 i3status-rs"


